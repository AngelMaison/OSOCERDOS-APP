*{box-sizing:border-box;margin:0;padding:0}

#bnav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--bg2);border-top:1px solid var(--border);display:flex;height:58px}

.nb.active{color:var(--orange)}
.nb.active::after{content:'';position:absolute;top:0;left:5%;right:5%;height:2px;background:var(--orange)}

.page{padding:10px;animation:pageIn .15s ease}
@keyframes pageIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}

.pill{padding:4px 10px;border-radius:5px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.pill.on{background:var(--orange);border-color:var(--orange);color:#fff}

.tier-hdr-label{flex:1;font-size:11px;color:var(--text2)}

.vrow{display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--bg2);border-bottom:1px solid var(--border);cursor:default}
.vrow:first-of-type{border-radius:7px 7px 0 0}
.vrow:last-of-type{border-radius:0 0 7px 7px;border-bottom:none}
.vrow-num{font-size:10px;color:var(--text3);width:18px;text-align:right;flex-shrink:0}
.vrow-info{flex:1}

.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;align-items:flex-end}
.modal-ov.show{display:flex}
.modal-box{background:var(--bg2);border-top:1px solid var(--border);border-radius:16px 16px 0 0;padding:14px;width:100%;max-height:82vh;overflow-y:auto}

function tier(kmh){
  if(kmh>=240)return{l:"S+",c:"t-sp",col:"var(--tsp)"};
  if(kmh>=210)return{l:"S",c:"t-s",col:"var(--ts)"};
  if(kmh>=180)return{l:"A+",c:"t-ap",col:"var(--tap)"};
  if(kmh>=160)return{l:"A",c:"t-a",col:"var(--ta)"};
  if(kmh>=130)return{l:"B",c:"t-b",col:"var(--tb)"};
  return{l:"C",c:"t-c",col:"var(--tc)"};
}

function fmtP(p){
  if(p===undefined||p===null||p===0)return"$0";
  if(p>=1000000)return"$"+(p/1000000).toFixed(1)+"M";
  return"$"+(p/1000).toFixed(0)+"K";
}

function toast(msg,err){
  var t=document.getElementById("toast");
  t.textContent=msg;
  t.className=err?"show err":"show";
  setTimeout(function(){t.className="";},2200);
}

function goTab(tab){
  ST.tab=tab;
  document.querySelectorAll(".nb").forEach(function(b){b.classList.toggle("active",b.dataset.tab===tab);});
  render();
  window.scrollTo(0,0);
}

function closeDw(){
  document.getElementById("dwOv").classList.remove("show");
  document.getElementById("drawer").classList.remove("show");
}

function closeGM(){

function updatePSNDisplay(){
  document.getElementById("psn-display").textContent=ST.psn||"";

function editPSN(){
  var cur=ST.psn||"";
  var el=document.getElementById("psn-display");
  el.outerHTML='<input class="psn-input" id="psn-input" type="text" placeholder="Tu PSN..." value="'+cur+'" maxlength="16" onblur="savePSN(this.value)">';
  var inp=document.getElementById("psn-input");
  if(inp){inp.focus();inp.onkeydown=function(e){if(e.key==="Enter")inp.blur();};}
}

function savePSN(val){
  ST.psn=val.trim();
  save();
  var el=document.getElementById("psn-input");
  if(el)el.outerHTML='<span class="psn-name" id="psn-display" onclick="editPSN()">'+ST.psn+'</span>';
}

function save(){
  try{localStorage.setItem("oso_v5",JSON.stringify({garage:ST.garage,owned_props:ST.owned_props,owned_w:ST.owned_w,psn:ST.psn,my_glitches:ST.my_glitches}));}catch(e){}
}

function load(){
  try{
    var d=JSON.parse(localStorage.getItem("oso_v5")||"{}");
    if(d.garage)ST.garage=d.garage;
    if(d.owned_props)ST.owned_props=d.owned_props;
    if(d.owned_w)ST.owned_w=d.owned_w;
    if(d.psn)ST.psn=d.psn;
    if(d.my_glitches)ST.my_glitches=d.my_glitches;
  }catch(e){}
}

    if(f.type==="avion")veh=veh.filter(function(v){return v.t==="P"||v.t==="J";});
    else{var tmap={car:"C",moto:"M",heli:"H",barco:"B"};if(tmap[f.type])veh=veh.filter(function(v){return v.t===tmap[f.type];});}
  }
  if(f.cls!=="all")veh=veh.filter(function(v){return v.cl===f.cls;});
  
  function spd(v){return ST.hsw&&v.h?v.h:v.s;}
  if(f.tier!=="all")veh=veh.filter(function(v){return tier(spd(v)).l===f.tier;});
  veh.sort(function(a,b){return spd(b)-spd(a);});
  
  var TIERS=["S+","S","A+","A","B","C"];
  var TIER_COLS={"S+":"var(--tsp)","S":"var(--ts)","A+":"var(--tap)","A":"var(--ta)","B":"var(--tb)","C":"var(--tc)"};
  var grouped={};
  TIERS.forEach(function(tl){grouped[tl]=[];});
  veh.forEach(function(v){grouped[tier(spd(v)).l].push(v);});
  
  var num=1;var rowsHTML="";
  TIERS.forEach(function(tl){
    var list=grouped[tl];if(!list.length)return;
    var tc=TIER_COLS[tl];
    rowsHTML+='<div class="tier-section">';
    rowsHTML+='<div class="tier-hdr" style="background:'+tc+'18;border:1px solid '+tc+'30">';
    rowsHTML+='<div class="tier-hdr-badge" style="color:'+tc+';border-color:'+tc+'">'+tl+'</div>';
    rowsHTML+='<div class="tier-hdr-label">'+(tl==="S+"?"240+ km/h":tl==="S"?"210–239 km/h":"<210 km/h")+'</div>';
    rowsHTML+='<div style="font-size:10px;color:var(--text3)">'+list.length+'</div></div>';
    list.forEach(function(v){
      var sp2=ST.hsw&&v.h?v.h:v.s;var tinfo=tier(sp2);
      var typeIcon=v.t==="C"?"🚗":v.t==="M"?"🏍️":v.t==="J"?"🛩️":v.t==="P"?"✈️":v.t==="H"?"🚁":"⛵";
      rowsHTML+='<div class="vrow">';
      rowsHTML+='<div class="vrow-num">'+num+'</div>';
      rowsHTML+='<div class="vrow-info"><div class="vrow-name">'+v.n+'</div>';
      rowsHTML+='<div class="vrow-sub">'+typeIcon+' '+v.cl+'</div></div>';
      rowsHTML+='<div class="vrow-spd" style="color:'+tc+'">'+sp2+'</div>';
      rowsHTML+='<div class="vrow-tier" style="color:'+tinfo.col+';border-color:'+tinfo.col+'">'+tinfo.l+'</div>';
      rowsHTML+='<button class="vrow-add" onclick="openGM(\''+v.n.replace(/'/g,"\\'")+"','"+v.t+"')\">+</button>";
      rowsHTML+='</div>';num++;
    });
    rowsHTML+='</div>';
  });

  document.getElementById("app").innerHTML='<div class="page">'+
    '<input class="sinp" type="text" placeholder="🔍 Buscar..." value="'+f.q+'" oninput="setSF(\'q\',this.value)">'+
    '<div style="display:flex;gap:5px;margin-bottom:8px;overflow-x:auto">'
    +'<span class="pill'+(f.type==="all"?" on":"")+'" onclick="setSF(\'type\',\'all\')">⚡ Todos</span>'
    +'<span class="pill'+(f.type==="car"?" on":"")+'" onclick="setSF(\'type\',\'car\')">🚗 Coches</span>'
    +'<span class="pill'+(f.type==="moto"?" on":"")+'" onclick="setSF(\'type\',\'moto\')">🏍️ Motos</span>'
    +'<span class="pill'+(f.type==="avion"?" on":"")+'" onclick="setSF(\'type\',\'avion\')">✈️ Aviones</span>'
    +'<span class="pill'+(ST.hsw?" on":"")+'" onclick="setHSW(!ST.hsw)">🛡️ HSW</span>'
    +'</div>'+
    '<div class="tier-legend">'+
    TIERS.map(function(t){return'<span class="tleg" style="color:'+TIER_COLS[t]+'"><span class="tleg-box" style="color:'+TIER_COLS[t]+'">'+t+'</span></span>';}).join("")+
    '</div>'+
    rowsHTML+
    '</div>';
  updatePSNDisplay();
}

function setSF(k,v){ST.sf[k]=v;renderSpeed();}
function setHSW(v){ST.hsw=v;renderSpeed();}

function openGM(vname,vtype){
  var air=["P","J","H"].indexOf(vtype)>=0;var html="";
  GARAGES.forEach(function(g){
    if(air&&!g.air)return;
    var entries=ST.garage[g.id]||[];var used=entries.length;
    html+='<div class="gopt" onclick="addToGarage(\''+g.id+'\')">';
    html+='<div style="flex:1"><div class="gopt-name">'+g.name+'</div></div>';
    html+='<div style="font-size:10px">'+used+'/'+(g.slots||'∞')+'</div>';
    html+='</div>';
  });
  document.getElementById("gm-ttl").textContent=vname;
  document.getElementById("gm-body").innerHTML=html;
  document.getElementById("gmOv").classList.add("show");
}

function addToGarage(gid){
  if(!ST.garage[gid])ST.garage[gid]=[];
  var vname=document.getElementById("gm-ttl").textContent;
  ST.garage[gid].push({vi:vname,note:""});
  save();closeGM();toast(vname+" ✓");
}

function renderGarage(){
  var allE=[];
  Object.values(ST.garage).forEach(function(arr){arr.forEach(function(e){allE.push(e);});});
  var total=allE.length;
  
  if(total===0){
    document.getElementById("app").innerHTML='<div class="page" style="text-align:center;padding:40px 20px"><div style="font-size:50px;margin-bottom:10px">🚗</div><div style="color:var(--text2)">Tu garaje está vacío. Añade vehículos desde Velocidad.</div></div>';
    return;
  }
  
  var html='<div class="page"><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px">';
  html+='<div class="gstat-box"><div class="gstat-num">'+total+'</div><div class="gstat-lbl">Total</div></div>';
  html+='<div class="gstat-box"><div class="gstat-num">'+allE.filter(function(e){var v=VR.find(function(x){return x.n===e.vi;});return v&&v.t==="C";}).length+'</div><div class="gstat-lbl">Coches</div></div>';
  html+='<div class="gstat-box"><div class="gstat-num">'+allE.filter(function(e){var v=VR.find(function(x){return x.n===e.vi;});return v&&v.t==="M";}).length+'</div><div class="gstat-lbl">Motos</div></div>';
  html+='</div>';
  
  var garageCats={};
  GARAGES.forEach(function(g){
    var entries=ST.garage[g.id]||[];
    if(entries.length){
      if(!garageCats[g.cat])garageCats[g.cat]=[];
      garageCats[g.cat].push({g:g,entries:entries});
    }
  });
  
  Object.keys(garageCats).forEach(function(cat){
    html+='<div style="margin-top:10px;font-family:Black Ops One,sans-serif;font-size:11px;color:var(--orange);letter-spacing:1px">'+cat.toUpperCase()+'</div>';
    garageCats[cat].forEach(function(item){
      var used=item.entries.length;
      var pct=item.g.slots>0?Math.round(used/item.g.slots*100):100;
      var sc=pct>=100?'sf-hi':pct>=80?'sf-md':'sf-lo';
      html+='<div class="gcard">';
      html+='<div style="display:flex;justify-content:space-between;margin-bottom:4px"><div class="gc-name">'+item.g.name+'</div><div style="font-size:10px;color:var(--text2)">'+used+'/'+(item.g.slots||'∞')+'</div></div>';
      if(item.g.slots>0){html+='<div class="slot-bar"><div class="slot-fill '+sc+'" style="width:'+pct+'%"></div></div>';}
      item.entries.forEach(function(e,idx){
        html+='<div class="gv-item"><div style="flex:1"><div class="gv-nm">'+e.vi+'</div></div>';
        html+='<button class="gv-del" onclick="delEntry(\''+item.g.id+'\','+idx+')">✕</button></div>';
      });
      html+='</div>';
    });
  });
  
  html+='</div>';
  document.getElementById("app").innerHTML=html;
  updatePSNDisplay();
}

function delEntry(gid,idx){
  ST.garage[gid].splice(idx,1);
  if(!ST.garage[gid].length)delete ST.garage[gid];
  save();renderGarage();
}

function renderProps(){
  var owned=Object.keys(ST.owned_props).length;
  var income=0;
  Object.keys(ST.owned_props).forEach(function(pid){
    var p=PROPS.find(function(x){return x.id===pid;});
    if(p)income+=p.daily;
  });
  
  var html='<div class="page">';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px">';
  html+='<div class="gstat-box"><div class="gstat-num">'+owned+'</div><div class="gstat-lbl">Propiedades</div></div>';
  html+='<div class="gstat-box"><div class="gstat-num">'+fmtP(income)+'/día</div><div class="gstat-lbl">Ingresos</div></div>';
  html+='</div>';
  
  html+='<div style="font-family:Black Ops One,sans-serif;font-size:12px;color:var(--orange);letter-spacing:1px;margin:12px 0">📊 MEJORES OPORTUNIDADES</div>';
  
  var notOwned=PROPS.filter(function(p){return !ST.owned_props[p.id]&&p.price>0;});
  notOwned.sort(function(a,b){
    var roiA=a.daily>0?a.price/a.daily:9999;
    var roiB=b.daily>0?b.price/b.daily:9999;
    return roiA-roiB;
  });
  
  notOwned.slice(0,10).forEach(function(p){
    var roi=p.daily>0?Math.ceil(p.price/p.daily):0;
    var roiCol=(roi<30)?'var(--green)':(roi<90)?'var(--yellow)':'var(--text2)';
    var stars="";var eff=p.daily/p.price*10000;
    if(eff>50)stars="⭐⭐⭐⭐⭐";else if(eff>30)stars="⭐⭐⭐⭐";else if(eff>15)stars="⭐⭐⭐";else if(eff>5)stars="⭐⭐";else stars="⭐";
    
    html+='<div class="gcard">';
    html+='<div style="display:flex;justify-content:space-between"><div><div class="gc-name">'+p.name+'</div>';
    html+='<div style="font-size:10px;color:var(--text2)">'+p.cat+'</div></div>';
    html+='<div style="text-align:right"><div style="font-size:11px;font-weight:700">'+fmtP(p.daily)+'/día</div>';
    html+='<div style="font-size:10px;color:'+roiCol+'">'+roi+' días ROI</div></div></div>';
    html+='<div style="font-size:10px;color:var(--text2);margin-top:4px">'+stars+'</div>';
    html+='<button style="width:100%;padding:6px;background:var(--orange);border:none;border-radius:5px;color:#fff;font-weight:700;font-size:12px;margin-top:6px;cursor:pointer" onclick="buyProp(\''+p.id+'\')">Comprar '+fmtP(p.price)+'</button>';
    html+='</div>';
  });
  
  html+='<div style="font-family:Black Ops One,sans-serif;font-size:12px;color:var(--orange);letter-spacing:1px;margin:12px 0">🏠 MIS PROPIEDADES</div>';
  
  if(owned===0){
    html+='<div style="padding:20px;text-align:center;color:var(--text2)">Sin propiedades aún</div>';
  }else{
    PROPS.forEach(function(p){
      if(!ST.owned_props[p.id])return;
      html+='<div class="gcard">';
      html+='<div style="display:flex;justify-content:space-between"><div><div class="gc-name">'+p.name+'</div>';
      html+='<div style="font-size:10px;color:var(--text2)">'+p.cat+'</div></div>';
      html+='<div style="text-align:right"><div style="font-size:11px;font-weight:700;color:var(--green)">+'+fmtP(p.daily)+'/día</div></div></div>';
      html+='<button style="width:100%;padding:6px;background:var(--red);border:none;border-radius:5px;color:#fff;font-weight:700;font-size:12px;margin-top:6px;cursor:pointer" onclick="sellProp(\''+p.id+'\')">Vender</button>';
      html+='</div>';
    });
  }
  
  html+='</div>';
  document.getElementById("app").innerHTML=html;
  updatePSNDisplay();
}

function buyProp(pid){
  ST.owned_props[pid]=true;save();
  var p=PROPS.find(function(x){return x.id===pid;});
  toast(p.name+" ✓");renderProps();
}

function sellProp(pid){
  delete ST.owned_props[pid];save();
  var p=PROPS.find(function(x){return x.id===pid;});
  toast(p.name+" vendida");renderProps();
}

  GLITCHES.forEach(function(g){
    var isSaved=saved.indexOf(g.id)>=0;
    var riskCol=g.risk==="Bajo"?"var(--green)":g.risk==="Medio"?"var(--yellow)":"var(--red)";
    
    html+='<div class="gcard">';
    html+='<div style="display:flex;justify-content:space-between;align-items:flex-start">';
    html+='<div style="flex:1">';
    html+='<div class="gc-name">'+g.name+'</div>';
    html+='<div style="font-size:10px;color:var(--text2);margin-top:2px">'+g.desc+'</div>';
    html+='<div style="font-size:9px;color:var(--text3);margin-top:4px;display:flex;gap:8px">';
    html+='<span>⏱ '+g.time+'</span>';
    html+='<span style="color:'+riskCol+'">⚠ '+g.risk+'</span>';
    html+='</div></div>';
    html+='<button style="width:28px;height:28px;border:1px solid var(--border);background:'+(isSaved?'var(--orange)':'var(--bg3)')+';color:#fff;border-radius:4px;cursor:pointer;font-size:14px" onclick="toggleGlitch(\''+g.id+'\')">'+
      (isSaved?'★':'☆')+'</button>';
    html+='</div>';
    html+='<div style="font-size:9px;color:var(--text2);margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">'+g.method+'</div>';
    html+='</div>';
  });
  
  html+='</div>';
  document.getElementById("app").innerHTML=html;
  updatePSNDisplay();
}

function toggleGlitch(gid){
  var idx=ST.my_glitches.indexOf(gid);
  if(idx>=0)ST.my_glitches.splice(idx,1);
  else ST.my_glitches.push(gid);
  save();renderGlitches();
}

// ═══════════════════════════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════════════════════════

function render(){
  switch(ST.tab){
    case 'speed': renderSpeed();break;
    case 'garage': renderGarage();break;
    case 'props': renderProps();break;
    case 'weapons': renderWeapons();break;
    case 'missions': renderMissions();break;
    case 'custom': renderCustomization();break;
    case 'glitches': renderGlitches();break;
  }
}

// INIT
load();
render();
updatePSNDisplay();
</script>

</body>
</html>

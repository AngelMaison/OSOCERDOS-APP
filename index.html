<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111">
<title>OSOCERDOS APP - V2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0c;--bg2:#121218;--bg3:#1a1a24;--bg4:#222230;--bg5:#2a2a3c;
  --border:#2a2a3a;--border2:#3a3a50;
  --text:#ccd0e0;--text2:#8080b0;--text3:#50507a;
  --orange:#ff6600;--red:#ff3355;--green:#00e070;--cyan:#00c8e0;--purple:#b060ff;--blue:#2299ff;--yellow:#f0b000;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
body{padding-bottom:70px}
input,select,textarea,button{font-family:'Rajdhani',sans-serif;outline:none}

/* --- HEADER --- */
header{background:var(--bg);border-bottom:1px solid var(--border);padding:10px 15px 8px;position:sticky;top:0;z-index:300}
.hdr-logo{font-family:'Black Ops One',sans-serif;font-size:24px;background:linear-gradient(90deg,var(--orange),#ff3333,var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 10px rgba(255,100,0,.3))}
.hdr-stats{display:flex;gap:12px;margin-top:5px}
.hstat{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px}
.hstat span{color:var(--orange);font-weight:700;font-size:13px}

/* --- NAV --- */
#bnav{position:fixed;bottom:0;left:0;right:0;z-index:400;background:var(--bg2);border-top:1px solid var(--border);display:flex;height:62px;padding:0 5px}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:none;border:none;color:var(--text3);font-size:10px;font-weight:700;cursor:pointer;gap:3px;position:relative}
.nb i{font-size:20px}
.nb.active{color:var(--orange)}
.nb.active::after{content:'';position:absolute;top:0;width:30px;height:3px;background:var(--orange);border-radius:0 0 4px 4px}

/* --- COMPONENTS --- */
.page{padding:12px;animation:fadeIn 0.2s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px}
.sinp{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);font-size:15px;margin-bottom:10px}
.pill{padding:5px 12px;border-radius:20px;background:var(--bg3);border:1px solid var(--border2);font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;white-space:nowrap}
.pill.on{background:var(--orange);border-color:var(--orange);color:white}

/* Estilos específicos para Estética */
.aesthetic-tip{background:rgba(0,200,224,0.05);border-left:3px solid var(--cyan);padding:8px 12px;margin-top:8px;font-size:12px;line-height:1.4}
.tag-style{display:inline-block;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:800;text-transform:uppercase;margin-right:4px}

/* --- RENTABILIDAD --- */
.rent-box{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.rent-item{background:var(--bg3);padding:8px;border-radius:6px;text-align:center}
.rent-val{font-size:15px;font-weight:700;color:var(--green)}
.rent-lbl{font-size:9px;color:var(--text3);text-transform:uppercase}
</style>
</head>
<body>

<header>
    <div class="hdr-logo">OSOCERDOS APP</div>
    <div class="hdr-stats">
        <div class="hstat">VALOR CUENTA: <span id="total-val">$0</span></div>
        <div class="hstat">GARAJE: <span id="garage-count">0/0</span></div>
    </div>
</header>

<div id="main-content"></div>

<nav id="bnav">
    <button class="nb active" onclick="nav('vel')"><i>🏎️</i><div>VELOCIDAD</div></button>
    <button class="nb" onclick="nav('gar')"><i>🏠</i><div>GARAJE</div></button>
    <button class="nb" onclick="nav('pro')"><i>🏢</i><div>NEGOCIOS</div></button>
    <button class="nb" onclick="nav('gui')"><i>📜</i><div>GUÍAS</div></button>
    <button class="nb" onclick="nav('arm')"><i>🔫</i><div>ARMAS</div></button>
</nav>

<script>
// --- DATA ESTRUCTURADA (Corregida para evitar errores de referencia) ---
const ST = {
    view: 'vel',
    search: '',
    owned_props: {}, // ID: true/false
    owned_upgrades: {}, // ID_upgrade: true/false
    myGarage: [],
    myWeapons: {}, // ID: {purchased: bool, inBag: bool}
    prioManual: {} // ID_business: [indices de prioridad]
};

// Pautas estéticas según tipo de coche
const ESTETICA = {
    "Súper": { style: "Agresivo", tips: "Alerones de carbono altos, faldones extendidos y llantas 'Track' o 'High End'. Suspensión de competición obligatoria para sensación de suelo.", color: "#00c8e0" },
    "Deportivo": { style: "Street/JDM", tips: "Llantas tipo 'Tuner', camber ligero, escapes de titanio. Colores vivos con acabados nacarados.", color: "#ff6600" },
    "Muscle": { style: "Drag/Dragster", tips: "Ruedas traseras anchas, capó con toma de aire (Bugcatcher), pintura mate con franjas. Sin alerones grandes.", color: "#ff3355" },
    "Clásico": { style: "Elegante", tips: "Llantas de radios (Wire), cromados limpios, pintura clásica sólida o metálica oscura. Evitar kits de carrocería modernos.", color: "#f0b000" }
};

const VEHICULOS = [
    { id: "hsw_italigto", name: "Itali GTO Stinger TT (HSW)", spd: 168.5, tier: "S+", cat: "Súper", price: 2380000 },
    { id: "pariah", name: "Ocelot Pariah", spd: 136.0, tier: "S", cat: "Deportivo", price: 1420000 },
    { id: "emerus", name: "Progen Emerus", spd: 127.3, tier: "S", cat: "Súper", price: 2750000 },
    { id: "krieger", name: "Benefactor Krieger", spd: 127.3, tier: "S", cat: "Súper", price: 2875000 },
    { id: "buffalo_stx", name: "Bravado Buffalo STX", spd: 126.3, tier: "A+", cat: "Muscle", price: 2150000 }
];

const NEGOCIOS = [
    { id: "kosatka", name: "Submarino Kosatka", cat: "Heists", price: 2200000, profit_per_hour: 1200000, desc: "Acceso a Cayo Perico.", tips: "Usa el Sparrow para preparativos rápidos." },
    { id: "bunker", name: "Búnker", cat: "Pasivo", price: 1200000, profit_per_hour: 80000, desc: "Producción de armas.", upgrades: ["Equipo", "Personal", "Seguridad"] },
    { id: "agency", name: "Agencia", cat: "Contratos", price: 2000000, profit_per_hour: 250000, desc: "Contratos VIP y Dr. Dre.", upgrades: ["Taller", "Armería"] }
];

const ARMAS = [
    { id: "ap_pistol", name: "Pistola AP", cat: "Pistola", price: 5000 },
    { id: "special_carbine", name: "Carabina Especial", cat: "Fusil", price: 14000 },
    { id: "heavy_sniper_mk2", name: "Francotirador Pesado MK2", cat: "Sniper", price: 165000 }
];

// --- LÓGICA DE NAVEGACIÓN Y RENDER ---
function nav(view) {
    ST.view = view;
    document.querySelectorAll('.nb').forEach((b, i) => {
        b.classList.toggle('active', ['vel','gar','pro','gui','arm'][i] === view);
    });
    render();
}

function render() {
    const cont = document.getElementById('main-content');
    let html = '';

    if (ST.view === 'vel') {
        html += `
            <input class="sinp" id="vsearch" type="text" placeholder="Buscar vehículo..." value="${ST.search}" oninput="updateSearch(this.value)">
            <div class="cnt-line">Mostrando ${filteredVehicles().length} vehículos</div>
        `;
        filteredVehicles().forEach(v => {
            const est = ESTETICA[v.cat] || { style: "Custom", tips: "Personalización libre.", color: "#ccc" };
            html += `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <div>
                            <span class="tag-style" style="background:${est.color}; color:#000">${v.cat}</span>
                            <div style="font-weight:700; font-size:15px; margin-top:4px">${v.name}</div>
                        </div>
                        <div style="text-align:right">
                            <div style="font-family:'Black Ops One'; color:var(--orange)">${v.spd} MPH</div>
                            <div style="font-size:10px; color:var(--text3)">TIER ${v.tier}</div>
                        </div>
                    </div>
                    <div class="aesthetic-tip">
                        <strong style="color:${est.color}">PAUTA ${est.style}:</strong> ${est.tips}
                    </div>
                    <button onclick="addToGarage('${v.id}')" style="width:100%; margin-top:8px; padding:6px; background:var(--bg3); border:1px solid var(--border2); border-radius:6px; color:var(--text); font-weight:700; font-size:11px">+ AÑADIR AL GARAJE</button>
                </div>
            `;
        });
    }

    if (ST.view === 'pro') {
        html += `<div style="font-family:'Black Ops One'; color:var(--orange); margin-bottom:12px">CALCULADORA DE RENTABILIDAD</div>`;
        NEGOCIOS.forEach(n => {
            const owned = ST.owned_props[n.id];
            const roi = Math.ceil(n.price / n.profit_per_hour);
            html += `
                <div class="card" style="border-left: 4px solid ${owned ? 'var(--green)' : 'var(--border)'}">
                    <div style="display:flex; justify-content:space-between">
                        <div style="font-weight:700">${n.name}</div>
                        <input type="checkbox" ${owned ? 'checked' : ''} onclick="toggleProp('${n.id}')">
                    </div>
                    <div style="font-size:11px; color:var(--text2); margin:4px 0">${n.desc}</div>
                    <div class="rent-box">
                        <div class="rent-item">
                            <div class="rent-val">$${(n.price/1000).toFixed(0)}k</div>
                            <div class="rent-lbl">Inversión</div>
                        </div>
                        <div class="rent-item">
                            <div class="rent-val">${roi}h</div>
                            <div class="rent-lbl">Recuperación (ROI)</div>
                        </div>
                    </div>
                    ${n.upgrades ? renderUpgrades(n) : ''}
                </div>
            `;
        });
    }

    if (ST.view === 'arm') {
        html += `<div class="cnt-line">Si marcas un arma en la mochila, se marca como comprada automáticamente.</div>`;
        ARMAS.forEach(a => {
            const state = ST.myWeapons[a.id] || { purchased: false, inBag: false };
            html += `
                <div class="card" style="display:flex; align-items:center; gap:12px">
                    <div style="font-size:24px">🔫</div>
                    <div style="flex:1">
                        <div style="font-weight:700">${a.name}</div>
                        <div style="font-size:10px; color:var(--text3)">${a.cat}</div>
                    </div>
                    <div style="text-align:center">
                        <div style="font-size:9px; margin-bottom:2px">MOCHILA</div>
                        <input type="checkbox" ${state.inBag ? 'checked' : ''} onclick="toggleWeapon('${a.id}', 'inBag')">
                    </div>
                    <div style="text-align:center">
                        <div style="font-size:9px; margin-bottom:2px">COMPRADA</div>
                        <input type="checkbox" ${state.purchased || state.inBag ? 'checked' : ''} onclick="toggleWeapon('${a.id}', 'purchased')">
                    </div>
                </div>
            `;
        });
    }

    cont.innerHTML = html;
    updateStats();
}

// --- LÓGICA DE NEGOCIO Y FIXES ---

// Fix: Búsqueda sin pérdida de foco
function updateSearch(val) {
    ST.search = val.toLowerCase();
    // En lugar de render() completo, actualizamos solo la lista de resultados si es posible,
    // pero para mantener simplicidad en este bloque, llamamos a render pero mantenemos el focus manualmente.
    render();
    document.getElementById('vsearch').focus();
    // Movemos el cursor al final
    const input = document.getElementById('vsearch');
    input.setSelectionRange(input.value.length, input.value.length);
}

function filteredVehicles() {
    return VEHICULOS.filter(v => v.name.toLowerCase().includes(ST.search) || v.cat.toLowerCase().includes(ST.search));
}

// Fix: Armas automáticas
function toggleWeapon(id, field) {
    if (!ST.myWeapons[id]) ST.myWeapons[id] = { purchased: false, inBag: false };
    ST.myWeapons[id][field] = !ST.myWeapons[id][field];
    
    // Regla: si está en mochila, está comprada
    if (field === 'inBag' && ST.myWeapons[id].inBag) {
        ST.myWeapons[id].purchased = true;
    }
    render();
}

function toggleProp(id) {
    ST.owned_props[id] = !ST.owned_props[id];
    render();
}

function renderUpgrades(biz) {
    let html = `<div style="margin-top:10px; padding-top:8px; border-top:1px solid var(--border)">
                <div style="font-size:10px; font-weight:700; color:var(--cyan); margin-bottom:5px">MEJORAS (Prioridad Dinámica)</div>`;
    biz.upgrades.forEach((upg, idx) => {
        const upgId = `${biz.id}_${upg}`;
        const done = ST.owned_upgrades[upgId];
        html += `
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px; opacity: ${done ? '0.4' : '1'}">
                <input type="checkbox" ${done ? 'checked' : ''} onclick="toggleUpgrade('${upgId}')">
                <span style="font-size:12px; ${done ? 'text-decoration:line-through' : ''}">${idx+1}. ${upg}</span>
            </div>
        `;
    });
    html += `</div>`;
    return html;
}

function toggleUpgrade(upgId) {
    ST.owned_upgrades[upgId] = !ST.owned_upgrades[upgId];
    render();
}

function addToGarage(id) {
    const v = VEHICULOS.find(x => x.id === id);
    ST.myGarage.push(v);
    updateStats();
    alert(`${v.name} añadido al garaje.`);
}

function updateStats() {
    // Calcular valor total teniendo en cuenta el valor MÁXIMO (vehículos + propiedades compradas)
    let total = 0;
    // Sumar vehículos en garaje
    ST.myGarage.forEach(v => total += v.price);
    // Sumar propiedades
    NEGOCIOS.forEach(n => {
        if (ST.owned_props[n.id]) total += n.price;
    });

    document.getElementById('total-val').innerText = `$${(total/1000000).toFixed(2)}M`;
    document.getElementById('garage-count').innerText = `${ST.myGarage.length} VEH.`;
}

// Inicio
nav('vel');
</script>
</body>
</html>

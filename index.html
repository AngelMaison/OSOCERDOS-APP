<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>OSOCERDOS APP - V2 CORREGIDA</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    /* TUS VARIABLES Y ESTILOS BASE SE MANTIENEN */
    :root {
        --bg:#111114; --bg2:#191920; --orange:#e85c00; --cyan:#00c8e0; --border:#2a2a3a; --text:#ccd0e0;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; margin: 0; padding-bottom: 70px; }
    
    /* MEJORA 1: BUSCADOR FIJO (Sin pérdida de foco) */
    .search-container { position: sticky; top: 0; background: var(--bg); z-index: 100; padding: 10px; border-bottom: 1px solid var(--border); }
    .sinp { width: 100%; background: #1e1e28; border: 1px solid var(--border); border-radius: 8px; padding: 10px; color: white; outline: none; }
    .sinp:focus { border-color: var(--orange); }

    /* MEJORA 2: TARJETAS DE RENTABILIDAD (ROI) */
    .roi-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; margin: 10px; overflow: hidden; }
    .roi-header { padding: 12px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); }
    .roi-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border-top: 1px solid var(--border); }
    .roi-stat-item { background: var(--bg2); padding: 8px; text-align: center; }
    .roi-val { display: block; font-weight: bold; color: var(--cyan); font-size: 1.1em; }
    .roi-lbl { font-size: 0.7em; color: #777; text-transform: uppercase; }

    /* MEJORA 3: PRIORIDADES DINÁMICAS (Tachado visual) */
    .prio-list { padding: 10px; }
    .prio-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 6px; margin-bottom: 4px; transition: 0.3s; border: 1px solid transparent; }
    .prio-item.done { opacity: 0.3; filter: grayscale(1); background: #000; border-color: #222; }
    .prio-item.done span { text-decoration: line-through; }

    /* NAV ORIGINAL */
    #bnav { position: fixed; bottom: 0; width: 100%; height: 60px; background: var(--bg2); border-top: 1px solid var(--border); display: flex; }
    .nb { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #555; cursor: pointer; }
    .nb.active { color: var(--orange); border-top: 2px solid var(--orange); }
</style>
</head>
<body>

<header style="padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
    <div>
        <div style="font-size: 9px; color: var(--orange); letter-spacing: 2px;">OSOCERDOS EXCLUSIVE</div>
        <h1 style="font-family: 'Black Ops One'; margin: 0; font-size: 22px;">APP V2</h1>
    </div>
    <div style="text-align: right;">
        <div style="font-size: 9px; color: #777;">VALOR PATRIMONIO</div>
        <div id="total-val" style="color: #00ff88; font-weight: bold; font-size: 18px;">$0.00M</div>
    </div>
</header>

<div id="main-content"></div>

<nav id="bnav">
    <div class="nb active" onclick="nav('vel')">🏎️<span>GARAJE</span></div>
    <div class="nb" onclick="nav('biz')">🏢<span>NEGOCIOS</span></div>
    <div class="nb" onclick="nav('arm')">🔫<span>ARMERÍA</span></div>
    <div class="nb" onclick="nav('gui')">📜<span>GUÍAS</span></div>
</nav>

<script>
// --- DATOS BASADOS EN TU ARCHIVO ---
let STATE = {
    search: '',
    garage: [], // IDs de vehículos comprados
    owned_biz: {}, // { id: true/false }
    upgrades: {}, // { bizId_upgName: true }
    weapons: {} // { id: {inBag: bool, owned: bool} }
};

// He extraído los vehículos top de tu lista de "Sensación de Velocidad"
const VEHICULOS = [
    {id:'v1', n: "Itali GTO Stinger TT", p: 2380000, spd: 168.5, tip: "Usa alerón de carbono para ganar estabilidad visual."},
    {id:'v2', n: "Grotti Itali RSX", p: 3465000, spd: 135.3, tip: "La silueta más agresiva del juego."},
    {id:'v3', n: "Pfister Comet S2", p: 1878000, spd: 123.0, tip: "Líneas de roadster puras."},
    {id:'v4', n: "Karin Futo GTX", p: 1590000, spd: 105.0, tip: "Perfecto para Drift y estilo japonés."}
];

// Integración de BIZ_DATA y PROP_DATA de tu archivo
const NEGOCIOS = [
    {id:'kosatka', n: "Kosatka", p: 2200000, inc: 1300000, upgs: ["Sparrow", "Misiles", "Sonar"]},
    {id:'bunker', n: "Búnker Chumash", p: 1650000, inc: 75000, upgs: ["Equipo", "Personal", "Seguridad"]},
    {id:'agency', n: "Agencia", p: 2010000, inc: 50000, upgs: ["Armería", "Taller Imani", "Alojamiento"]}
];

const ARMAS = [
    {id:'ap', n: "Pistola AP", p: 5000},
    {id:'heavy_rev', n: "Revólver Pesado MkII", p: 12000},
    {id:'carbine_sp', n: "Carabina Especial", p: 14000}
];

// --- MOTOR DE RENDERIZADO ---
function nav(t) {
    const cont = document.getElementById('main-content');
    document.querySelectorAll('.nb').forEach(n => n.classList.remove('active'));
    event?.currentTarget?.classList.add('active');

    if(t === 'vel') {
        cont.innerHTML = `
            <div class="search-container">
                <input type="text" class="sinp" placeholder="Buscar vehículo..." oninput="updateSearch(this.value)" value="${STATE.search}">
            </div>
            <div id="list-vel"></div>
        `;
        renderVel();
    } else if(t === 'biz') {
        renderBiz(cont);
    } else if(t === 'arm') {
        renderArmas(cont);
    }
    updateStats();
}

// BUSCADOR: Actualiza solo la lista, no el input
function updateSearch(val) {
    STATE.search = val.toLowerCase();
    renderVel();
}

function renderVel() {
    const list = document.getElementById('list-vel');
    if(!list) return;
    const filtered = VEHICULOS.filter(v => v.n.toLowerCase().includes(STATE.search));
    list.innerHTML = filtered.map(v => `
        <div style="padding:15px; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center">
            <div>
                <div style="font-weight:bold">${v.n}</div>
                <div style="font-size:10px; color:var(--cyan)">${v.spd} MPH • $${(v.p/1000000).toFixed(2)}M</div>
                <div style="font-size:11px; color:#777; margin-top:4px; font-style:italic">"${v.tip}"</div>
            </div>
            <button onclick="toggleGarage('${v.id}')" style="background:${STATE.garage.includes(v.id)?'var(--orange)':'#333'}; border:none; color:white; padding:8px 12px; border-radius:6px; font-size:12px; font-weight:bold">
                ${STATE.garage.includes(v.id)?'PROPIEDAD':'COMPRAR'}
            </button>
        </div>
    `).join('');
}

function renderBiz(cont) {
